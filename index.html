<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINGLES DICTIONARY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a0b2e 0%, #2d1b4e 50%, #1a1a3e 100%);
            background-attachment: fixed;
            position: relative;


        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
        pointer-events: none;
        }

        h1 {
            color: white;
        }

        .content-box {
            display: flex;
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin-top: 20px;
            min-height: 50vh;
            width: 50%;
            align-items: center;
            justify-content: center;

        }
        .box-contents{
            display: flex;
            flex-direction: column;
            margin-top: 20px;
        }
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .btn, .content-box{
            transition: transform 0.2s ease, box-shadow 0.2s ease-in-out;
        }

        .btn-primary:hover, .content-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }

        .form-control:focus {
            border-color: #6c5ce7;
            box-shadow: 0 0 0 0.25rem rgba(108, 92, 231, 0.25);
        }

        .btn-primary {
            background-color: #6c5ce7;
            border-color: #6c5ce7;
        }

        .loader-glass {
            font-size: 40px;
            display: inline-block;
            animation: search-move 1.5s infinite ease-in-out;
        }


        @keyframes search-move {
            0% {transform: translate(0, 0) rotate(15deg);}
            25% {transform: translate(10px, 10px) rotate(15deg);}
            50% {transform: translate(-10px, 5px) rotate(-15deg);}
            75% {transform: translate(5px, -10px) rotate(10deg);}
            100% {transform: translate(0, 0) rotate(0deg);}
        }

        .book-opening-icon {
            font-size: 3rem;
            color : #6c5ce7;
            display: inline-block;
            animation: book-flip 2s infinite ease-in-out;
        }


        @keyframes book-flip {
            0%, 100% {transform: scaleX(1);} 
            50% {transform: scaleX(-1);}           
        }

    </style>
</head>
<body>



    <div class="main-content">
        <div class="container mt-5">
            <div class="text-center">
                <i class = "bi bi-book-half book-opening-icon"></i>
            </div>
            <h1 class="text-center mb-4">
                
                <span style="font-family: Georgia, 'Times New Roman', Times, serif; font-style: italic; font-weight: normal; font-size: 2rem; color: #b8a9e8">DICTIONARIUM</span>
                <br>
                <span style="font-family: 'Times New Roman', serif; font-size: 1.5rem; letter-spacing: 5px; color: #e8d5b7;">ΣΟΛΟΡΥΜ</span>
            </h1>    
                
                
            <p class="text-muted mt-2" style="letter-spacing: 3px;">SINGLES DICTIONARY</p>
            <div class="row">
                <div class="col-md-6 offset-md-3">
                    <form id="search-form">
                        <div class="mb-3">
                            <input type="text" name="word" id="word-input" class="form-control" placeholder="Enter a word to search..." required >
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Search</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="content-box" id="result-box">
            <div class="box-contents">
                <div id="loading" style="display: none;" class="text-center">
                    <div class="loader-glass">🔍</div>

                    <p class= "mt-2 fw-bold text-secondary">Hunting fiercely for that meaning.......</p>
                </div>
                <div id="placeholder-text">
                    <i class="bi bi-search"></i> Hear yee !!! Hear yee!!! Results will be displayed here.....
                </div>
                <div id="result-content">    

                </div>

            </div>

        </div>
    </div>

<script src="index.js"></script>
</body>
</html>
